# Render Blueprint: a Rails web service + a managed PostgreSQL database.
# Deploy by connecting this repo as a Blueprint in the Render dashboard.
databases:
  - name: moodtunes-db
    databaseName: moodtunes
    user: moodtunes
    plan: free

services:
  - type: web
    name: moodtunes
    runtime: ruby
    plan: free
    buildCommand: "bundle install && bundle exec rails assets:precompile && bundle exec rails assets:clean"
    startCommand: "bundle exec rails db:migrate && bundle exec puma -C config/puma.rb"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: moodtunes-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false                 # set manually in the Render dashboard
      - key: YOUTUBE_API_KEY
        sync: false                 # set manually in the Render dashboard
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: RAILS_ENV
        value: production
      - key: RAILS_SERVE_STATIC_FILES
        value: "true"
      - key: RAILS_LOG_TO_STDOUT
        value: "true"
      - key: WEB_CONCURRENCY
        value: "2"
